# Этот файл нужно положить в репозитории по пути: .github/workflows/daily-post.yml
# (GitHub Actions ищет workflow-файлы только в этой папке)

name: Daily Telegram News Post

on:
  schedule:
    # 09:00 по Москве = 06:00 UTC. Поменяйте под нужное время.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # позволяет запускать вручную кнопкой "Run workflow" на GitHub

permissions:
  contents: write   # нужно, чтобы Action мог закоммитить обновлённый news_log.jsonl обратно

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run poster script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python post_news.py

      - name: Save news log back to repo
        run: |
          if [ -n "$(git status --porcelain news_log.jsonl)" ]; then
            git config user.name "news-bot"
            git config user.email "news-bot@users.noreply.github.com"
            git add news_log.jsonl
            git commit -m "Update news log [skip ci]"
            git push
          else
            echo "Лог не изменился, коммитить нечего."
          fi

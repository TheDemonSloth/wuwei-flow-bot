# Этот файл нужно положить в репозитории по пути: .github/workflows/daily-post.yml
# (GitHub Actions ищет workflow-файлы только в этой папке)

name: Daily Telegram News Post

on:
  schedule:
    # Каждый час, но НЕ в начале часа (0-я минута) — это момент пиковой
    # нагрузки на шедулер GitHub Actions, такие задачи часто задерживаются
    # или пропускаются. 17-я минута — обычная практика для более надёжного
    # срабатывания по расписанию.
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      force_now:
        description: "Собрать новую партию новостей прямо сейчас, не дожидаясь 6:00 UTC (только для ручного теста)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # нужно, чтобы Action мог закоммитить news_log.jsonl и post_queue.json обратно

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run poster script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_NOW: ${{ inputs.force_now }}
        run: python post_news.py

      - name: Save state back to repo
        run: |
          if [ -n "$(git status --porcelain news_log.jsonl post_queue.json)" ]; then
            git config user.name "news-bot"
            git config user.email "news-bot@users.noreply.github.com"
            git add news_log.jsonl post_queue.json
            git commit -m "Update posting state [skip ci]"
            git push
          else
            echo "Ничего не изменилось, коммитить нечего."
          fi
